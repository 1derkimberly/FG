<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>S&P 500 API Test</title>
<style>
:root{--bg:#0b1020;--p:#111827cc;--p2:#0f172acc;--l:#334155;--t:#e5eefb;--m:#94a3b8;--g:#22c55e;--r:#ef4444;--a:#60a5fa}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,sans-serif;background:radial-gradient(circle at top,var(--a)33,transparent 35%),var(--bg);color:var(--t)}
.wrap{max-width:1300px;margin:0 auto;padding:20px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:16px}.btns{display:flex;gap:8px;flex-wrap:wrap}
button{border:1px solid var(--l);background:linear-gradient(180deg,#60a5fa33,#60a5fa11);color:var(--t);padding:10px 12px;border-radius:12px;cursor:pointer}.grid{display:grid;grid-template-columns:1.1fr .9fr;gap:14px}
.card{background:var(--p);border:1px solid #ffffff14;border-radius:18px;padding:16px;box-shadow:0 24px 80px #0006}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.m{background:var(--p2);border:1px solid #ffffff12;border-radius:14px;padding:12px}.k{color:var(--m);font-size:12px;text-transform:uppercase}.v{font-size:24px;font-weight:700;margin-top:6px}.pos{color:var(--g)}.neg{color:var(--r)}
.chart{height:420px;position:relative;overflow:hidden}.chart svg{width:100%;height:100%}pre{margin:12px 0 0;background:#020617aa;border:1px solid #ffffff12;border-radius:12px;padding:12px;max-height:300px;overflow:auto;color:#cbd5e1}
@media(max-width:1000px){.grid{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,1fr)}}
</style></head>
<body><div class="wrap">
<div class="top"><div><h1 style="margin:0">S&P 500 API Test</h1><div style="color:var(--m)">왼쪽 지수, 오른쪽 차트로 API 연결 검증</div></div><div class="btns"><button id="btn1">FMP Quote</button><button id="btn2">Alpha Vantage</button><button id="btn3">Hist Test</button></div></div>
<div class="grid">
<div class="card"><div class="metrics"><div class="m"><div class="k">Index</div><div class="v" id="idx">--</div><div id="chg" class="k">--</div></div><div class="m"><div class="k">Open</div><div class="v" id="op">--</div></div><div class="m"><div class="k">High</div><div class="v" id="hi">--</div></div><div class="m"><div class="k">Low</div><div class="v" id="lo">--</div></div></div><pre id="log">Ready</pre></div>
<div class="card chart"><svg viewBox="0 0 1000 420"><path id="fill" fill="#60a5fa22" d="M0,300 L1000,300 L1000,300 L0,300 Z"></path><path id="line" stroke="#60a5fa" stroke-width="4" fill="none" d="M0,300 L1000,300"></path></svg></div>
</div></div>
<script>
const log=t=>document.getElementById('log').textContent=t;
const api={fmp:{q:'https://financialmodelingprep.com/api/v3/quote/%5EGSPC?apikey=YOUR_KEY',h:'https://financialmodelingprep.com/api/v3/historical-price-full/%5EGSPC?serietype=line&apikey=YOUR_KEY'},av:'https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=SPY&apikey=YOUR_KEY'};
function chart(arr){const w=1000,h=420,p=30;const min=Math.min(...arr),max=Math.max(...arr),sx=(w-2*p)/(arr.length-1),sy=v=>h-p-((v-min)/(max-min||1))*(h-2*p);let d=`M0,${sy(arr[0])}`;for(let i=1;i<arr.length;i++)d+=` L${i*sx},${sy(arr[i])}`;document.getElementById('line').setAttribute('d',d);document.getElementById('fill').setAttribute('d',d+` L1000,390 L0,390 Z`)}
async function fmp(){const k=prompt('FMP API key?'); if(!k) return; const r=await fetch(`https://financialmodelingprep.com/api/v3/quote/%5EGSPC?apikey=${k}`); const j=await r.json(); log(JSON.stringify(j,null,2)); const x=j[0]||{}; idx.textContent=x.price?.toFixed?.(2)||'--'; op.textContent=x.open?.toFixed?.(2)||'--'; hi.textContent=x.dayHigh?.toFixed?.(2)||'--'; lo.textContent=x.dayLow?.toFixed?.(2)||'--'; chg.textContent=`${x.change>=0?'+':''}${x.change?.toFixed?.(2)||'--'} (${x.changesPercentage?.toFixed?.(2)||'--'}%)`; chg.className=x.change>=0?'k pos':'k neg'}
async function av(){const k=prompt('Alpha Vantage key?'); if(!k) return; const r=await fetch(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=SPY&apikey=${k}`); const j=await r.json(); log(JSON.stringify(j,null,2)); const x=j['Global Quote']||{}; idx.textContent=x['05. price']||'--'; op.textContent=x['02. open']||'--'; hi.textContent=x['03. high']||'--'; lo.textContent=x['04. low']||'--'; chg.textContent=`${x['09. change']||'--'} (${x['10. change percent']||'--'})`; }
async function hist(){const k=prompt('FMP API key?'); if(!k) return; const r=await fetch(`https://financialmodelingprep.com/api/v3/historical-price-full/%5EGSPC?serietype=line&apikey=${k}`); const j=await r.json(); log(JSON.stringify(j,null,2).slice(0,3000)); const a=(j.historical||[]).slice(0,60).reverse().map(x=>x.close); if(a.length>1) chart(a)}
btn1.onclick=fmp;btn2.onclick=av;btn3.onclick=hist;
</script></body></html>
