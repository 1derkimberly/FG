<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>S&P 500 Monitor</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(17, 24, 39, 0.82);
      --panel2: rgba(15, 23, 42, 0.92);
      --line: rgba(148, 163, 184, 0.18);
      --text: #e5eefb;
      --muted: #94a3b8;
      --green: #22c55e;
      --red: #ef4444;
      --accent: #60a5fa;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(96,165,250,0.22), transparent 35%),
        radial-gradient(circle at 20% 20%, rgba(34,197,94,0.10), transparent 30%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap { max-width: 1180px; margin: 0 auto; padding: 28px 18px 40px; }
    .topbar {
      display:flex; justify-content:space-between; gap:16px; align-items:flex-start; margin-bottom:20px;
    }
    .title h1 { margin:0; font-size:28px; letter-spacing:-0.03em; }
    .title p { margin:8px 0 0; color: var(--muted); }
    .actions { display:flex; gap:10px; flex-wrap:wrap; }
    button {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(96,165,250,.18), rgba(96,165,250,.08));
      color: var(--text);
      padding: 12px 14px;
      border-radius: 14px;
      cursor: pointer;
      box-shadow: var(--shadow);
    }
    button:hover { border-color: rgba(96,165,250,.45); }
    .grid {
      display:grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 16px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .hero { grid-column: span 8; }
    .side { grid-column: span 4; }
    .metric-grid { display:grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 14px; }
    .metric {
      background: var(--panel2);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      min-height: 92px;
    }
    .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .08em; }
    .value { font-size: 24px; font-weight: 700; margin-top: 8px; }
    .sub { color: var(--muted); font-size: 13px; margin-top: 6px; }
    .pos { color: var(--green); }
    .neg { color: var(--red); }
    .status {
      display:flex; gap: 10px; align-items:center; margin-top: 12px; color: var(--muted);
    }
    .dot { width:10px; height:10px; border-radius:999px; background: var(--green); box-shadow: 0 0 0 6px rgba(34,197,94,.14); }
    .chart {
      height: 320px;
      margin-top: 18px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(15,23,42,.72), rgba(15,23,42,.94));
      position: relative;
      overflow: hidden;
      padding: 18px;
    }
    .chart svg { width: 100%; height: 100%; }
    .axis { fill: rgba(148,163,184,.75); font-size: 12px; }
    .spark { stroke: #60a5fa; stroke-width: 3; fill: none; }
    .fill { fill: rgba(96,165,250,.14); }
    .list { display:grid; gap: 12px; margin-top: 14px; }
    .row {
      display:flex; justify-content:space-between; align-items:center; gap: 10px;
      padding: 14px; border-radius: 14px; background: rgba(15,23,42,.85); border: 1px solid var(--line);
    }
    .row strong { display:block; }
    .row span { color: var(--muted); font-size: 13px; }
    pre {
      margin: 0; margin-top: 14px; padding: 14px; border-radius: 14px;
      background: rgba(2,6,23,.65); border: 1px solid var(--line);
      color: #cbd5e1; overflow:auto; max-height: 260px;
    }
    @media (max-width: 980px){
      .hero,.side{ grid-column: span 12; }
      .metric-grid{ grid-template-columns: repeat(2,1fr); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title">
        <h1>S&P 500 Monitor</h1>
        <p>현재값 + 과거 데이터 모니터링용 프론트엔드</p>
      </div>
      <div class="actions">
        <button id="refresh">새로고침</button>
        <button id="test">API 테스트</button>
      </div>
    </div>

    <div class="grid">
      <div class="card hero">
        <div class="label">Market Snapshot</div>
        <div class="metric-grid">
          <div class="metric"><div class="label">Index</div><div class="value" id="indexValue">4,987.21</div><div class="sub" id="indexDelta">+12.42 (+0.25%)</div></div>
          <div class="metric"><div class="label">Open</div><div class="value" id="openValue">4,976.88</div><div class="sub">오늘 시가</div></div>
          <div class="metric"><div class="label">High</div><div class="value" id="highValue">4,992.10</div><div class="sub">일중 고가</div></div>
          <div class="metric"><div class="label">Low</div><div class="value" id="lowValue">4,968.44</div><div class="sub">일중 저가</div></div>
        </div>
        <div class="status"><div class="dot"></div><div>데이터 소스: API 연결 전 / 예시 UI</div></div>
        <div class="chart">
          <svg viewBox="0 0 1000 320" preserveAspectRatio="none" aria-label="S&P 500 chart">
            <defs>
              <linearGradient id="g" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0%" stop-color="rgba(96,165,250,0.35)"/>
                <stop offset="100%" stop-color="rgba(96,165,250,0.02)"/>
              </linearGradient>
            </defs>
            <path class="fill" d="M0,260 C120,220 170,240 260,190 C350,140 420,165 500,120 C610,65 700,120 790,95 C880,70 930,55 1000,45 L1000,320 L0,320 Z"></path>
            <path class="spark" d="M0,260 C120,220 170,240 260,190 C350,140 420,165 500,120 C610,65 700,120 790,95 C880,70 930,55 1000,45"></path>
            <text class="axis" x="12" y="24">1D Trend</text>
            <text class="axis" x="920" y="300">Now</text>
          </svg>
        </div>
      </div>

      <div class="card side">
        <div class="label">Watchlist</div>
        <div class="list">
          <div class="row"><div><strong>SPY</strong><span>S&P 500 ETF proxy</span></div><div class="pos">+0.34%</div></div>
          <div class="row"><div><strong>VIX</strong><span>Volatility gauge</span></div><div class="neg">-1.12%</div></div>
          <div class="row"><div><strong>US10Y</strong><span>Bond yield</span></div><div class="pos">+0.03%</div></div>
        </div>
        <pre id="out">준비 완료.\n아래 API 키만 연결하면 실제 데이터 표시 가능.</pre>
      </div>
    </div>
  </div>

  <script>
    const out = document.getElementById('out');
    const log = (...a) => out.textContent = a.join(' ');

    const API_KEY = 'C8CWR9VZRVBK2A5I';
    const BASE = 'https://www.alphavantage.co/query';

    async function testApi() {
      const url = `${BASE}?function=GLOBAL_QUOTE&symbol=SPY&apikey=${API_KEY}`;
      try {
        const res = await fetch(url, { mode: 'cors' });
        const text = await res.text();
        log('HTTP', res.status, '\n\n', text.slice(0, 1200));
      } catch (e) {
        log('ERR:', e.message, '\nCORS 차단이면 백엔드 프록시가 필요함');
      }
    }

    document.getElementById('test').onclick = testApi;
    document.getElementById('refresh').onclick = () => location.reload();
  </script>
</body>
</html>
